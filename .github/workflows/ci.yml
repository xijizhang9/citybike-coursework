name: CityBike CI - Trust Boundary Enforcement

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  validate-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install tools
        run: |
          npm install -g swagger-cli schemathesis

      - name: Validate all OpenAPI specifications (Trust Boundary Contracts)
        run: |
          swagger-cli validate openapi/user-service.yaml
          swagger-cli validate openapi/ride-service.yaml
          swagger-cli validate openapi/bike-inventory-service.yaml
          swagger-cli validate openapi/payment-service.yaml
          swagger-cli validate openapi/partner-analytics-service.yaml

      - name: Build all Docker services
        run: docker compose build

      - name: Start services in background
        run: docker compose up -d

      - name: Wait for services to be ready
        run: sleep 10

      - name: Run Schemathesis Contract Tests (Enforce Authentication & Boundaries)
        run: |
          schemathesis run openapi/user-service.yaml --url http://localhost:3001 --header "Authorization: Bearer fake-jwt-token-123" --header "X-Internal-Auth: internal-mtls-token" --checks=all --max-examples=5
          schemathesis run openapi/ride-service.yaml --url http://localhost:3002 --header "Authorization: Bearer fake-jwt-token-123" --header "X-Internal-Auth: internal-mtls-token" --checks=all --max-examples=5
          schemathesis run openapi/bike-inventory-service.yaml --url http://localhost:3003 --header "Authorization: Bearer fake-jwt-token-123" --header "X-Internal-Auth: internal-mtls-token" --header "X-HMAC-Signature: valid-hmac-signature-from-device" --checks=all --max-examples=5
          schemathesis run openapi/payment-service.yaml --url http://localhost:3004 --header "X-Internal-Auth: internal-mtls-token" --checks=all --max-examples=5
          schemathesis run openapi/partner-analytics-service.yaml --url http://localhost:3005 --header "X-API-Key: valid-partner-api-key" --header "X-Internal-Auth: internal-mtls-token" --checks=all --max-examples=5

      - name: Stop services
        if: always()
        run: docker compose down
