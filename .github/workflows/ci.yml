name: CityBike CI - Trust Boundary Enforcement

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install swagger-cli
        run: npm install -g swagger-cli

      - name: Validate all OpenAPI Specifications
        run: |
          swagger-cli validate openapi/user-service.yaml
          swagger-cli validate openapi/ride-service.yaml
          swagger-cli validate openapi/bike-inventory-service.yaml
          swagger-cli validate openapi/payment-service.yaml
          swagger-cli validate openapi/partner-analytics-service.yaml

      - name: Build all Docker services
        run: docker compose build

      - name: Start services (validate runtime)
        run: |
          docker compose up -d
          sleep 10
          echo "✅ All 5 services started successfully"

      - name: Stop services
        if: always()
        run: docker compose down
